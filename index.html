<svg viewBox="0 0 120 120" width="100%" height="100%" style="background-color: #1e2330; border-radius: 12px; display: block; margin: auto;">
  <!-- Zemin Çizgisi -->
  <line x1="10" y1="95" x2="110" y2="95" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  
  <!-- HAREKETLİ KADIN FİGÜRÜ (Glute Bridge Örneği) -->
  <g>
    <!-- Animasyon: Kalçayı ve gövdeyi yukarı/aşağı pürüzsüzce hareket ettirir -->
    <animateTransform 
      attributeName="transform" 
      type="translate" 
      values="0,0; 0,-18; 0,0" 
      dur="2.5s" 
      repeatCount="indefinite" 
      type="smooth"/>
      
    <!-- Baş ve Topuz Saç Detayı -->
    <circle cx="30" cy="85" r="7" fill="#fbcfe8"/>
    <circle cx="24" cy="81" r="4" fill="#db2777"/><!-- Saç Topuzu -->
    
    <!-- Anatomik Orantılı Gövde -->
    <path d="M37 86 Q 55 86 65 70" fill="none" stroke="#4f46e5" stroke-width="7" stroke-linecap="round"/>
    
    <!-- Karın Bölgesi Destek Çizgisi -->
    <path d="M37 86 Q 52 80 65 70" fill="none" stroke="#6366f1" stroke-width="3"/>
  </g>

  <!-- Sabit Kalan Bacaklar (Orantılı Diz ve Ayak Bileği Ekleyerek) -->
  <g>
    <!-- Üst Bacak / Diz -->
    <line x1="65" y1="70" x2="80" y2="52" stroke="#4f46e5" stroke-width="6" stroke-linecap="round">
      <animate attributeName="y2" values="52;34;52" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="80;75;80" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <!-- Alt Bacak / Ayak -->
    <line x1="80" y1="52" x2="85" y2="95" stroke="#6366f1" stroke-width="5" stroke-linecap="round">
      <animate attributeName="x1" values="80;75;80" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="y1" values="52;34;52" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Destek Alan Kollar -->
  <line x1="37" y1="88" x2="60" y2="88" stroke="#312e81" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Çalışan Kas Bölgesi Göstergesi (Kalça) -->
  <circle cx="60" cy="74" r="5" fill="#f43f5e" opacity="0.8">
    <animate attributeName="opacity" values="0.2;0.9;0.2" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="translate" values="0,0; 0,-18; 0,0" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>
